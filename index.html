<html lang="es">
<head>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --darker: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --card-bg: #1e293b;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.1));
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-card .label {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--light);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: rgba(99, 102, 241, 0.1);
        }

        .pins-section {
            display: none;
        }

        .pins-section.active {
            display: block;
        }

        .pins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .pin-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .pin-card.tested {
            opacity: 0.6;
            border-color: var(--success);
        }

        .pin-card.tested::after {
            content: '\2713 PROBADO';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--success);
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .pin-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .pin-card.tested .pin-number {
            color: var(--success);
        }

        .pin-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 5px;
        }

        .pin-rank {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .pin-frequency {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .pin-actions {
            display: flex;
            gap: 8px;
        }

        .pin-actions .btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 0.8rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--success);
            color: white;
            border-radius: 10px;
            font-weight: 600;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(0);
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--light);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-top {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .badge-high {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge-medium {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .pins-grid {
                grid-template-columns: 1fr;
            }

            .stat-card .number {
                font-size: 2rem;
            }

            .tabs {
                gap: 5px;
            }

            .tab {
                padding: 8px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

            { pin: '123000', frequency: '0.04%', rank: 44, pattern: 'Secuencia + ceros', tier: 'medium' },
            { pin: '131313', frequency: '0.04%', rank: 45, pattern: 'Patrón repetido', tier: 'medium' },
            { pin: '232323', frequency: '0.04%', rank: 46, pattern: 'Patrón repetido', tier: 'medium' },
            { pin: '343434', frequency: '0.03%', rank: 47, pattern: 'Patrón repetido', tier: 'medium' },
            { pin: '454545', frequency: '0.03%', rank: 48, pattern: 'Patrón repetido', tier: 'medium' },
            { pin: '565656', frequency: '0.03%', rank: 49, pattern: 'Patrón repetido', tier: 'medium' },
            { pin: '676767', frequency: '0.03%', rank: 50, pattern: 'Patrón repetido', tier: 'medium' }
        ];

        // Estado de PINes probados (localStorage)
        let testedPins = JSON.parse(localStorage.getItem('phonelockTestedPins') || '{}');

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'success' ? 'var(--success)' : type === 'warning' ? 'var(--warning)' : 'var(--danger)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleTested(pin) {
            if (testedPins[pin]) {
                delete testedPins[pin];
                showToast(`PIN ${pin} marcado como NO probado`, 'warning');
            } else {
                testedPins[pin] = Date.now();
                showToast(`✅ PIN ${pin} marcado como PROBADO`);
            }
            localStorage.setItem('phonelockTestedPins', JSON.stringify(testedPins));
            renderPins();
            updateStats();
        }

        function copyPin(pin) {
            navigator.clipboard.writeText(pin).then(() => {
                showToast(`📋 PIN ${pin} copiado al portapapeles`);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = pin;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`📋 PIN ${pin} copiado`);
            });
        }

        function renderPinCard(pinData) {
            const isTested = testedPins[pinData.pin];
            const badgeClass = pinData.tier === 'top' ? 'badge-top' : pinData.tier === 'high' ? 'badge-high' : 'badge-medium';
            const tierText = pinData.tier === 'top' ? '🔥 TOP' : pinData.tier === 'high' ? '⚡ ALTO' : '📌 MEDIO';

            return `
                <div class="pin-card ${isTested ? 'tested' : ''}" data-pin="${pinData.pin}">
                    <div class="pin-info">
                        <span class="pin-rank">#${pinData.rank}</span>
                        <span class="pin-frequency">${pinData.frequency}</span>
                        <span class="badge ${badgeClass}">${tierText}</span>
                    </div>
                    <div class="pin-number">${pinData.pin}</div>
                    <p style="color: var(--gray); font-size: 0.85rem; margin-bottom: 12px;">
                        📋 ${pinData.pattern}
                    </p>
                    <div class="pin-actions">
                        <button class="btn ${isTested ? 'btn-success' : 'btn-primary'}" onclick="toggleTested('${pinData.pin}')">
                            ${isTested ? '✅ Probado' : '🎯 Probar'}
                        </button>
                        <button class="btn btn-danger" onclick="copyPin('${pinData.pin}')" style="flex: 0 0 auto; padding: 8px 12px;" title="Copiar">
                            📋
                        </button>
                    </div>
                </div>
            `;
        }

        function applyFilters(pins) {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            const tierFilter = document.getElementById('tierFilter').value;

            let filtered = pins.filter(p => p.pin.includes(searchTerm));

            if (tierFilter !== 'all') {
                filtered = filtered.filter(p => p.tier === tierFilter);
            }

            if (sortBy === 'number') {
                filtered.sort((a, b) => parseInt(a.pin) - parseInt(b.pin));
            } else if (sortBy === 'frequency') {
                filtered.sort((a, b) => parseFloat(b.frequency) - parseFloat(a.frequency));
            }

            return filtered;
        }

        function renderEmptyState(message) {
            return `<div class="empty-state"><h3>😅</h3><p>${message}</p></div>`;
        }

        function renderPins() {
            const filtered4 = applyFilters(pins4Digits);
            const filtered6 = applyFilters(pins6Digits);

            const grid4 = document.getElementById('pins4Grid');
            const grid6 = document.getElementById('pins6Grid');

            grid4.innerHTML = filtered4.length > 0 ? filtered4.map(p => renderPinCard(p)).join('') : renderEmptyState('No se encontraron PINes de 4 dígitos con estos filtros');
            grid6.innerHTML = filtered6.length > 0 ? filtered6.map(p => renderPinCard(p)).join('') : renderEmptyState('No se encontraron PINes de 6 dígitos con estos filtros');

            const allPins = [...pins4Digits, ...pins6Digits];
            const allTested = allPins.filter(p => testedPins[p.pin]);
            const testedGrid = document.getElementById('testedGrid');
            testedGrid.innerHTML = allTested.length > 0 ? allTested.map(p => renderPinCard(p)).join('') : renderEmptyState('Aún no has probado ningún PIN. ¡Comienza a probar!');

            const allUntested = allPins.filter(p => !testedPins[p.pin]);
            const untestedGrid = document.getElementById('untestedGrid');
            untestedGrid.innerHTML = allUntested.length > 0 ? allUntested.map(p => renderPinCard(p)).join('') : renderEmptyState('¡Felicidades! Ya probaste todos los PINes.');

            document.getElementById('count4').textContent = filtered4.length;
            document.getElementById('count6').textContent = filtered6.length;
        }

        function updateStats() {
            const total = pins4Digits.length + pins6Digits.length;
            const tested = Object.keys(testedPins).length;
            const remaining = total - tested;
            const progress = total > 0 ? Math.round((tested / total) * 100) : 0;

            document.getElementById('totalPins').textContent = total;
            document.getElementById('testedPins').textContent = tested;
            document.getElementById('remainingPins').textContent = remaining;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.pins-section').forEach(s => s.classList.remove('active'));

            element.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function resetAll() {
            if (confirm('⚠️ ¿Estás seguro de reiniciar todo el progreso? Se borrarán todos los PINes marcados como probados.')) {
                testedPins = {};
                localStorage.removeItem('phonelockTestedPins');
                renderPins();
                updateStats();
                showToast('🗑️ Progreso reiniciado completamente', 'warning');
            }
        }

        function exportProgress() {
            const data = {
                exportDate: new Date().toISOString(),
                totalPins4: pins4Digits.length,
                totalPins6: pins6Digits.length,
                testedPins: testedPins,
                stats: {
                    total: pins4Digits.length + pins6Digits.length,
                    tested: Object.keys(testedPins).length,
                    remaining: (pins4Digits.length + pins6Digits.length) - Object.keys(testedPins).length
                }
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pin_tester_progreso_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Progreso exportado como JSON');
        }

        document.getElementById('searchInput').addEventListener('input', renderPins);

        renderPins();
        updateStats();
    </script>
</body>
</html>
